body:
  text: 李居士識候參夏令離陽用事大氣主開人如調護不謹諸症叢生或內傷外感因熱反寒見症紛紜分門疏敘茲以暑氣鬱蒸自鼻孔吸入傷於手經者宗內經主病以參治例特表於前蓋暑為上受宜入清虛之臟及其在腑非口受穢氣胃有穢積即經邪轉入於腑也故促聖立傷寒方法亦有關於手經者則傷暑治療亦不遺於足經矣若曰暑先入心則寒先入腎傷寒非全入腎則傷暑非悉入心矣須知暑氣無形惟注者受之至伏暑為病附於秋間復感涼風而發者經曰夏傷於暑秋為痎瘧暑積內著宜為滯下然則今之秋令病邪者又不本於伏暑而何哉壬寅秋治例一初夏過寒見足經症者宜與傷寒參看一初夏應暖反寒時行寒疫宜與瘟疫參看一初夏風雨不時人多感冒宗時行感冒法一仲夏時行陰雨陽氣鬱蒸宗濕溫症治一伏氣至夏發者脈洪有力壯熱宗熱病例治一盛暑大熱大旱汗多金傷宗燥熱症治一陰傷伏熱肺虛感暑但熱有時宗癉瘧治一伏暑未感涼風而發者俗名秋溫宗伏暑治一伏暑已感涼風而發者先寒後熱疏風解暑一伏暑重涼風輕寒輕熱重熱盛午後俗名溫瘧一伏暑輕涼風重寒重熱輕解表宣陽牝瘧參看一伏邪至秋分後傳入半里或入足經者宜用攻解一夏秋中暍露霧穢霍亂瀉痢均補於後卷一傷寒之藥宜氣厚傷暑之藥宜昧薄一熱病兼中暍觸發者名陽毒論夏初陰雨濕溫夏初陽氣夫暢則濕濁之氣已升未從陽化適逢陰雨連綿則濕盛亢陽於內以致頭重體倦舌白增寒弱不勝衣筋痠腰重難於展側蒸熱口渴足脛逆冷脈耎而混或濡弱者名曰濕溫濕盛小便不利者五苓散主之陽升則濕騰熱蒸則濕化若逢陰濕內不化濕外反受之則表裡合蒸自汗脈浮洪口渴濕化熱兼表症者桂枝白虎湯或桂苓甘露飲桂苓甘露二冬芩兩地甘斛與茵陳枳枇抑氣能降火本事方中犀角均自汗脈洪緩口渴舌紅苔白熱盛者蒼朮白虎湯愚按巳午之月六陽之氣齊浮若人真水下竭陽升吸濁皆浮於胃中反見面垢脈混而舌白煩渴最似溫熱惟以神脈合參之果如是有六味地黃湯少加梔豉或梔豉太越則加豆卷滑石或豬苓湯亦穩若虛寒者原可攝陰溫下沉陽六味地黃君熟地山萸山藥與丹皮豬苓湯用治熱勝茯苓澤瀉通水道肝腎不足最相宜澤瀉茯苓阿膠增手太陰肺經起中焦中俯穴下絡太腸循胃口上膈至肩走臂內前廉至寸口少商穴是經多氣少血其藏魄屬金統攝二身元氣主開主哭主皮毛本病諸氣膹郁諸痿喘嘔氣短咳嗽上逆嗽吐膿血不得臥小便數而欠遺失不禁標病灑淅寒熱傷風自汗肩背冷痛臑臂前廉痛氣實瀉之瀉子澤瀉亭厯桑皮地骨皮除濕半夏白礬白茯苡米木瓜橘皮瀉火石膏知母訶子寒水石粳米通滯枳殼桔梗薄荷乾薑木香厚朴杏仁皂莢氣虛補之補母人參黃耆甘草山藥升麻潤燥麥冬阿膠蛤貝母百合天冬花粉斂肺烏梅白芍粟殼五味五棓子本熱清之清金黃芩知母麥冬天冬山梔沙參紫菀本寒溫之丁香藿香檀香白蔻款冬益智砂仁糯米百部標寒散之解表麻黃紫蘇蔥白肺經報使桔梗升麻蔥白白芷寒傷營暑傷氣言後天之表寒傷火熱傷水言先天之本大江以南傷暑倍於傷寒遍考古書詳於傷寒而略於傷暑仲聖治傷寒至後則言邪分六經證通其變也古人治傷暑用香茹白虎湯清暑益氣等方治其常也今之暑邪祗有各經見症而無各經主方故特表而出之手太陰肺經症治暑風襲肺灑然汗出惡風淅然汗閉煩熱鼻塞善嚏喘滿痿躄或口渴舌黃少氣不得太息或膚麻手瞀咳引胸膺背臑臂前廉痛大小解不肅肺為清虛之臟也宜辛涼解肌辛夷白薇杏仁桔梗六一散開茉莉天泉水煎無汗惡汗加蘇葉汗多加白芍去桔梗熱甚加黃芩渴甚加花粉少氣煩渴加沙參麥冬第二條承上氣口脈濡弦而澀太陰傷暑也前湯主之服湯已汗出時不惡風而熱暢者表欲解也鼻塞當愈適喘咳未除而氣促者肺逆也此湯主之白前杏仁大貝粳米桑皮六一散照前煎服虛加洋參麥冬痰膩加橘白肺火加山梔唇燥口渴加甘梨漿第三條里症太陰暑症脈反滑大汗出惡熱胸滿便閉大次指痛氣滿皮膚殼殼然堅而不痛或下齒痛喉痹目黃鼽衄頸腫此為腑脈腑症肺與大腸為表裡腑以通為泰也此湯主之瓜蔞仁杏仁枳實桔梗六一散秦艽急流水煎熱盛加條芩津枯便秘不胸滿不可與之不滿胸而下利甘桔湯主之齒痛鼽衄熱盛加葛根石膏第四條夾寒暑入太陰自汗膚熱適其人脈反弦緊惡寒無汗鼻塞聲重舌苔白膩腰足拘急此為寒伏少陰貪涼臥濕所致仿內經實則瀉子法也此湯主之獨活辛夷香茹桔梗六一散韭白湯煎濕勝加澤瀉飲冷遏肺者加生薑陽虛色傷有汗忌服第五條夾熱傷暑脈濡弦今脈洪數有力煩熱多汗氣促口渴咳嗆咽乾此壯火爍金也可與此湯知母大貝花粉麥冬六一散桑葉粳米湯煎風淫自汗加白薇玉竹虛加人參如大熱大渴大汗脈洪實者腑脈也與白虎互參第六條壞症傷暑服前湯表裡症解脈自和者為不傳也若有變幻參其脈症所犯何逆所兼何症而治之設暑熱傷肺金津不布化濁痰結於肺下痰復生熱熱更生風以致久咳痰腥如癰膿者恐成暑療此湯主之牛蒡子馬兜鈴瓜蔞仁六一散大貝桔梗橘白麥冬蛤紛苡米湯煎熱渴加山梔嗽血加阿膠如肺氣虛而伏痰自汗者以玉屏風散去朮加貝母麥冬湯主之第七條傳經太陽傷暑若解若清若利小便反煩熱不解消渴神昏善笑此欲傳手厥陰也太陰未解還從肺治太陰症罷恐入少陰當於本門求之餘經仿此第八條調愈救逆肺家暑解津虧氣弱者調之則愈蜜拌洋參茯苓懷山藥大麥冬炙草扁豆湯煎太陰傷暑誤服足經表藥升散以致汗出不止氣促煩渴脈促無表症者生脈散救之若暑傷元氣誤汗者保元湯主之若升散太過元海無根龍雷飛躍者六味地黃湯加龍骨牡蠣若暑傷肺絡者咳血補肺阿膠湯加麥冬絲瓜絡手厥陰心包絡是經起於乳中天池下至臍下上散兩乳循肩走臂內中臁至中指中衝多血少氣心包之火寄體於命門命門為相火之源天地之始藏精生血降則為漏升則為鉛主三焦元氣本病前後癃閉氣逆裡急奔豚消渴膏淋精漏精寒赤白濁尿血崩中帶下以上皆主古賢言標病火強瀉之瀉相火黃柏知母丹皮生地地骨皮茯苓元參寒水石火弱補之益陽附子肉桂益智補骨脂胡桃丁香蛇床子烏藥覆盆子肉蓯容胡蘆巴巴戟大茴小茴鎖陽川椒蛤蚧當歸陽起石精脫固之澀精牡蠣芡實金櫻五味山萸遠志蛤粉命門報使柴胡丹皮手厥陰心包絡經症治暑邪之入心包也腠理開則灑然汗出閉則蒸蒸熱悶澹澹心動笑不休心大熱手心熱或目赤面黃或胸脅支滿以是經界於營衛交濟之中先宜辛香宣營達衛紫背鮮浮萍連喬殼薄荷梗益元散桔梗鮮佛手熱盛目赤加川連汗多去薄荷桔梗加茯神第二條承上心包傷暑脈本芤遲設其人脈反洪大躁煩神越多汗譫狂壯熱舌絳此暑熱鼓動心陽防為昏喘前湯不中與也無足少陰症者可與此湯辰砂麥冬粉丹皮赤芍益元散烏犀尖鮮生地佛手露竹葉湯煎狂甚加金氣第三條化風暑入心包煩躁發熱反見昏腫面垢油赤眼閉少溺表無大熱此暑痰矇昧心包裹熱不隨汗減者將欲化風發為痙厥此湯主之廣黃尖瓜蔞殼大貝遠志肉天竹黃山梔皮蟬殼益元散衝入竹瀝梨汁無汗加鮮菖蒲汁第四條經病肺主衛心主管包絡出則衛入則營是經從胸走手若肘臂攣急胸脅支滿乃為經病或熱化風而循經者此湯主之釣藤勾蟬退丹皮赤芍當歸鬚瓜蔞殼絲瓜絡西瓜翠衝入甘梨漿熱盛加羚羊角第五條腑症暑入心包服前法後脈反洪長壯熱頭汗躁擾狂越驚駭溢血耳鳴喉腫目銳皆疼次指如廢此為腑症包絡與三焦為表裡宗河澗先生三焦治法大豆卷黃芩黃連益元散黃柏脈實便閉無少陰症者重加大黃大黃原可救陰但虛不宜耳又熱在上焦梔豉湯越之熱在中焦白虎湯清之熱在下焦豬苓湯利之三焦治法均可選用第六條傷暑服前湯不解轉見消渴浸淫病況譫妄舌不能言此欲傳手少陰也若熱退脈和舌紅苔濁神倦如迷不語如呆此暑解痰凝包絡心液受戕之象囫圇川貝麥冬鮮菖蒲遠志鮮生地天竹黃露水一杯熱鬱加薄荷露陰陽相火薰心加龜版龍齒第七條心包暑解汗多神倦煩渴不眠者此湯主之生脈散麥冬包川連暑解神倦脈弱者此湯調之則愈鮮蓮子人參麥冬百合元眼暑解服前湯靜養五日愈手少陰心經起於極泉下絡小腸從心中挾咽自缺盆間循手臂內後廉至小指少衡穴又循頰至目系自經少血多氣主藏神為君火包絡相火代君行令主血主言主汗主笑本病諸熱黃芩瞀瘛驚惑譫妄煩亂啼笑罵詈怔忡健忘人參炙草自汗黃連痛癢黃柏瘡瘍黃連標病梔子湯畏寒戰慄舌不能言面赤目黃麥冬手心煩熱生地梔子胸脅滿痛引腰背肩胛肘臂火實瀉之瀉子黃連大黃瀉氣分火甘草赤茯苓木通黃柏瀉血分火丹參丹皮生地元參鎮驚牛黃硃砂紫石英神虛補之補母細辛烏梅棗仁生薑陳皮補氣桂心澤瀉茯神遠志菖蒲補血當歸熟地乳香沒藥本熟寒之瀉火黃芩竹葉麥冬芒硝炒鹽標熱發之散火甘草獨活柴胡麻黃薄荷心經報使黃連細辛手少陰心經症治署入心經煩熱自汗面赤目黃掌心熱善笑消渴善驚善忘或言多面垢或咳吐氣泄或兩腎內痛乃火淫所勝金水之症疊出隨其開泄之權以宜之非表汗也是祛暑也鮮菖蒲益元散連翹心梔子仁荷花露佛手露咳吐加麥冬腎痛加黃柏寒淫戰慄無汗少加細辛本經胸脅引臑臂內後臁痛風淫搐搦加薄荷煩燥神亂加珠黃散第二條承上少陰暑熱脈若虛洪洪而有力即為壯火舌色應絳汗出則喘促煩冤汗閉則躁煩狂亂多汗舌潤淡滲清利無汗煩熱芳香宣竅煩熱舌紅者此湯主之真川連辰砂麥冬元參心薄荷露荷花露調益元散喘加竹葉驚加牛黃紫石英渴加瓶果不渴加丹參第三條承上暑熱入心兩陽相灼蒸逼陰津本應多汗反無汗者一為營液表虧一為剛陽熏爍離宮陰劫舌絳無苔津液不能灌通絡竅內結為痰舌反生胎體若燔炭汗出而散神迷躁擾者芳香以開之甘梨漿薄荷露銀花露化服至寶丹無汗加浮萍汁熱渴加西瓜水渴不能飲加淡天冬面赤而紫加丹皮紫草汁第四條暑熱觸心陽壯熱昏冒汗出反劇舌絳譫妄面赤嗌乾欲飲冷水目赤如金者此離宮陰涸陽熱自燔亟用清火救陰為主烏犀尖淡天冬麥冬真川連中生地衝入荷花露無汗加桔梗簿荷露停飲加益元散拂鬱加佛手露第五條少陰傷暑脈浮洪者易兼腑症如嗌痛頜腫耳聾口糜小便短閉者皆為腑症心與小腸為表裡也無汗者清揚有汗者與此湯元參心本通甘草梢薄荷露竹葉心中生地熱盛加黑山梔熱盛不飲熱在血分大便結少加大黃微利之第六條心營暑熱服前法已熱退神清為已解也若譫妄舌不能言即為入臟或卒心痛煩悶善嘔壬癸甚丙丁大汗氣逆則壬癸死刺手少陰太陽穴餘經生克皆可類推臟腑不可刺不過剌經刺穴或心陽挾暑熱蘊結而為瘡瘍者此湯主之真川連黃柏生甘草全當歸赤芍粉丹皮瘡在表加荊芥金銀花瘍在裡加穿山甲廣鬱金第七條暑熱轉心營汗多液涸邪退熱除舌至光紅有紋語言強澀或神倦如迷或聲啞煩躁渴不欲飲者此為無液承滋用存精養液法清阿膠元參心大麥冬雞子黃淡天冬中生地聲啞加桔梗躁煩加荷花露咽齒俱干加豬膚白蜜有痰加天竺黃神搖惕惕加辰砂金器百合心第八條心家暑解心氣虛者此湯補之則愈人參麥冬丹參桂元棗仁心陰虛者此湯養之西洋參淡天冬柏子仁囫圇雞子黃鮮蓮子紅棗肉手陽明大陽經起於次指商陽穴循臂外前脈上項環口終迎香穴下走兩乳間入少腹是經氣血俱盛屬金主變化為傳送之官本病大便閉結泄痢下血里結後重疽痔脫肛腸鳴而痛標病下齒痛上齒胃下齒大腸喉痹咽屬胃喉屬太腸頸腫口乾咽中如核鼽衄目黃手大指次指痛宿食發熱寒慄腸實瀉之血分大黃芒硝石膏牽牛郁李仁桃仁巴豆氣分枳殼木香橘皮檳榔腸虛補之氣皂角燥桃仁麻仁杏仁地黃當歸乳香松子肉蓯蓉濕白朮茅朮半夏硫黃陷升麻葛根脫龍骨白堊訶子粟殼烏梅白礬石榴皮石脂餘糧本熱寒之清熱秦艽槐角地黃黃芩本寒溫之溫里乾薑附子肉豆蔻標熱散之解肌石膏白芷升麻葛根大腸報使白芷升麻石膏手陽明大腸經症治暑熱入陽明之經脈見浮滑几几即壯熱口乾目黃汗出不徹鼽衄頸腫或喘或面赤耳聾或咽中如核肩肘臂外前臁引手大指次指熱痛此為經邪宜越是湯主之白葛根秦艽杏仁六一散石膏無汗不渴去石膏加茅根咽中如核加桔梗第二條暑熱服前湯若解則捍衛熱泄可以通營脈必浮和滑耎若喉痹鼽衄下齒作痛本經之熱已揚再宜清解淡黃芩茅根石膏六一散桔梗見疹加牛蒡子第三條手陽明病汗收熱徹脈不耎尺浮日晡潮熱大便秘結裡急後重或泄痢下血疽痔脫肛者此為經邪入腑也此湯宜之條黃芩枳實桔梗全瓜蔞秦艽痢血痔下者去瓜蔞枳實加葛根桃花甘草大陽血結者去瓜蔞加桃仁大腸寒閉腸鳴而痛此湯不中與也第四條服前湯秘結若通暑滯亦從下解若泄痢下血者小腸邪熱亦從下趨可兼理小腸設利止反微熱而咳者此人陽餘邪傳肺而解也甘桔湯主之生草桔梗二味煎無汗加香薷同煎服第五條經邪歸腑本不復傅表熱則退餘邪皆從濁道而趨若邪靜有虛濕盧燥之分燥結用麻仁松子仁顯潤之滑泄用白朮半夏之屬燥之經邪表熱不徹反兼嗌痛領腫口糜欲傳手太陽也如兼耳鳴嗌腫驚駭為欲傳手少陽也手太陽小腸經起於小指外側少澤穴循臂外後廉從肩入缺盆絡心復上耳前聽宮穴止是經少氣多血主分秘水穀為受盛之官本病大便水穀利小便短小便閉小便血小便自利大便後血小腸氣痛宿食夜熱旦止標病身熱惡寒嗌痛頜腫口糜耳聾實熱瀉之氣熱木通豬苓滑石瞿麥澤瀉燈心血熱地黃蒲黃赤苓丹皮梔子虛寒補之氣虛白朮楝實茴香砂仁神麯扁豆血虛桂心延胡本熱寒之降火黃柏黃芩連翹梔子黃連標熱散之解肌羌活防風藁本蔓荊子小腸報使藁本黃柏手太陽小腸經症治暑熱入手太陽經脈見浮洪身熱微惡寒嗌痛領腫渴不善飲或口糜耳聾或掌熱汗出此為經邪宜越是湯主之蔓荊子梔子丹皮鮮菖蒲益元散惡寒肩臂外痛加羌活嗌痛口糜加鮮生地第二條服前湯已營通熱化諸症必減浮洪脈退為經邪得解設腰似折入暮熱劇不可轉側此熱結於血分也此湯主之卷邊香盡桃仁丹皮鮮生地赤苓茅根汁見癍加浮萍紅花第三條小腸經病若解表症悉罷設其人小便短或閉小便後血小腸氣痛此為經邪入腑也是湯主之鮮生地木通甘草梢粉丹皮赤苓瞿麥裡熱加山梔氣痛加延胡第四條太陽腑症服前湯溺血止而小便自利大便水穀利或大便後血此由小腸失受盛之權或暑熱侵傷腑氣也此湯養而升之生白朮清阿膠赤苓水楊枝荷葉蒂足太陽用五苓降逆手太陽用此升陽第五條太陽經腑均解本經氣血若虛不能分泌清濁大便反溏者此湯補之則愈上黨參丹參茯神生白朮砂仁柴胡三分補膽母手少陽三焦經起於中指外關衝循外中廉散絡心包上耳後眉上過眉心眼下止聽宮穴是經少血多氣為相火之用分布命門元氣主升降比入遊行天地之間總領五臟六腑營衛經絡外內上下左右之氣號中清之府上主納中主化下主出本病諸熱瞀瘛暴病暴死暴瘖躁擾狂越譫妄諸血溢血泄血驚駭諸氣逆衝上諸痛瘡瘍痘疹痛核標病惡寒戰慄如喪神守耳鳴耳聾嗌腫喉痹諸病肘腫疼痠驚駭手小次指不川上焦熱喘滿諸嘔吐酸胸痞脅痛飲食不消頭汗中焦熱善飢而瘦解㑊中滿諸脹腹大有聲諸病鼓之如鼓上下關格不通霍亂吐痢下焦熱暴注下迫水液渾濁下步腫脹小便淋瀝或不便大便閉結下痢上焦寒吐飲食痰水胸痹前後引痛食已還出中焦寒飲不化寒脹反胃吐水濕瀉不渴下焦寒二便不禁臍腹冷疝痛慎齋云上焦熱梔子中焦熱黃連下焦熱黃柏又上焦滿悶紫蘇杏仁陳皮中焦滿悶乾薑肉桂吳萸下焦加小茴上焦嘈雜生地中焦嘈雜山藥下焦嘈雜熟地上焦血虛則多用當歸肉桂而白朮宜少中焦則多用白朮血燥亦必加當歸下焦熟地三分肉桂二分湧泉穴火起黃柏一分上虛保元湯加減中虛益氣湯加減下虛地黃湯加減下焦有病六味丸可通用若泄瀉只宜調理脾胃不宜輕用實火瀉之汗麻黃葛根柴胡升麻羌活薄荷荊芥石膏吐瓜蒂滄鹽薺汁下芒硝大黃虛火補之上人參天雄桂心中人參黃耆丁香木香草蔻下人參附子桂心沉香烏藥故紙硫黃本熟寒之上黃芩連翹梔子知母元參石膏生地中黃連生地連翹石膏下黃柏知母石膏生地丹皮地骨皮標熱散之解表柴胡細辛荊芥羌活葛根石膏三焦報使連翹柴胡上地骨皮中青皮下附子手少陽三焦症治傷寒至厥陰為陰極暑熱入三焦為陽亢三焦為相火之用分布命門元氣遊行三才之間故伏氣必究三焦也天三焦有經界而無臟腑虛靈之權最重上焦主納主宣則心肺之陽可灌溉以下濟而光明中焦主運化分別陰陽升降清濁下焦主出主傳導則肝腎之陰得蒸變地道卑而上行守真先生升降分消獨得三焦之治法也三焦巳屬乎陽暑熱亦陽主客皆陽陽動則化火風變化莫捷兼之徹上徹下皆其所司能治最宜精切暑熱之在上焦者清解暑熱之在中焦者分消暑熱之在下焦者清利第二條暑熱之入三焦也微見惡寒戰慄即壯熱自汗脈洪而長口渴溺赤驚駭狂越或喘滿頭汗或霍亂吐利或暴注下迫譫忘血溢者分消湯主之粉葛根六一散生石膏脈不洪無汗不渴忌石膏無汗惡寒少加細辛喘滿頭汗加山梔霍亂吐利加川連暴注下迫加黃柏第三條三焦暑病喘滿心煩胸痞嘔逆頭汗口渴嗌痛喉痹或耳鳴耳聾耳後痛目銳眥疼小次指不用此熱在上焦宜越之淡豆豉薄荷葉元參連翹炒山梔一元散枳殼耳聾脅痛如柴胡黃芩氣逆衝上加桑皮地骨皮胸痞嘔逆加半夏瓜蔞肩臂外疼加釣藤第四條三焦傷寒善飢而瘦口渴壯熱善飲多汗狂越譫妄或中滿諸脹或上下關格不通或霍亂吐利者此熱在中焦也宜清之大豆卷石膏知母粳米竹葉六一散腹脹上下關格去石膏加川連乾薑枳殼霍亂吐利去知母加半夏藿香砂仁第五條暑在三焦壯熱自汗忽暴注下迫小便渾濁不利或大便閉結或泄血下痢附腫痠者此熱在下焦也宜利之益元散豬苓澤瀉清阿膠黃柏荷葉大陽氣閉加枳殼小腸血結加丹皮胕腫痠痛加木瓜第六條服前湯已暑熱似解尚見壯烈瞀瘛暴瘖溢血躁擾譫狂氣逆衝上此三焦本病他汗出舌紅者清火存陰酌之黃芩黃連黃柏生地茯神粳米湯煎蔗湯亦可若熱起小腹加鮮生地骨皮有虛陽上越宜溫補者有舌紅善笑傳包絡者有汗多亡陰陽熱獨發而為暴厥則危第七條三焦病解中氣虛塞胸滿吐涎已食反出寒脹不化二便不禁臍腹冷疼者此湯養之則愈人參白朮茯苓補骨脂木香小便不禁去茯苓臍腹冷痛加肉桂中穢中霧鼻受穢氣芳香以宣之陰虛陽胃易於觸穢口食穢味芳香兼下之霧乃濕從陽泛濁氣于于清道陽虛肺簿者上受之其症頭重惡寒煩悶此湯主之桂枝皮檳榔皮茯苓皮飛猾石茅朮霧蒙肌表飲阻胸中宗金匱一物瓜蒂湯手六經症治古書所注甚罕此乃新稿未可為憑以古明家方能著作平人只可述也故特書此恐誤於人論伏暑發於秋初者夏時伏暑舍營內秋感涼風並衛居蓋未月包絡主令離陰初降屆秋大腸主命其應庚金包絡在營之標大腸主衛之標蓋夏月汗出營虛暑熱易蘊秋初金風拂腠汗孔將收如是則衛風入而與暑爭營暑出而為風拂則寒熱往來暑鼓風陽出於手經氣分者則寒微熱熾發於辰巳之交淺而易汗易愈風束暑邪入於足經血分者則寒甚熱深發於午未之後深而遲汗遲愈若至晚則寒日高則熱又為氣血俱虛也前人已有治例存焉治涼風束衛暑熱伏營無汗者蘇葉防風丹皮簿荷杏仁桔梗益元散治前症有汗者則暑重涼輕牛蒡子丹皮山梔皮益元散赤芍論暑熱內伏未感涼風者脈應耎數化洪平人忽發熱鼻中氣熱唇口乾燥煩擾不寧小便赤或咳或噦若熱在營分者渴不欲飲若無汗者熱至烙手汗出則熱減汗徹則復熱此暑熱自里達表也涼膈散去硝黃加益元散或犀角地黃湯加香茹黃連香茹飲選用論暑濕內伏已感涼風者脈應弦澀緩秋令暴涼人每懶倦嗜臥肢痠無力慘慘不樂食少煩悶大小便不調蕭嗇惡風寒或肌膚不仁此暑濕傷中涼風著肺陽不升則陰不降用升陽益胃湯助燥收可也升陽益胃湯加減去黃耆加桑皮論伏暑在裡外感暴寒者伏暑在裡外感暴寒其人忽寒戰腹急痛或吐瀉至壯熱大汗則寒從暑化為病解若厥冷麵青為暑從寒陷則病進寒從暑化藿香正氣散黃連香茹飲豆樸薷連暑從寒陷加減五積散加減大順散選用論伏暑傷金成療元虛津薄之人暑熱蘊入心營營虛氣耗不能宣布暑熱暑熱挾心陽反來熏肺肺爍金痿則皮毛乾五心熱喘咳煩冤食少無味而白無華肌肉消爍溺赤便難或自汗或痰中帶血釀成勞療此在良工消息治之或開肺生津或滋營涼解使暑熱外泄方可存陰保肺補土生金庶無夭枉論瘧如柴胡挑少陽之陽陽升則邪化矣瘧者暑之表症暑瘧邪居淺近治從營衛搜求正瘧邪入足經挑出三陽化解因涼風外並太陽伏暑內著陽明太陽闔則寒陽明開則熱反開合之權應是少陽樞機為病故瘧脈自弦內經設臟腑各經均有瘧應取此為正也夫風木偽病每多於申西月發於中酉時者以木喜向榮逢克則爭逢衰則病且秋分亦為半表半裡之候也仲聖治少陽用小柴胡湯入以人參半夏一為木能戕土一為風動痰生故瘧病多痰至於一日間日行速行遲在氣在血出陽入陰良工可考古人以大瘧三陰猶可為訓云數年伏邪難於確據何以春夏時溫大發邪清之後秋冬又有復發大瘧者乎愚以為暑夜乘涼風露襲入於陰者有之即陰邪入於陰分是也論痢痢者暑之裡症暑令雕陽發泄胃土空虛冷食傷中釀成績垢前賢已宣蓋暑積而為滯下有二一以暑邪阻肺肺氣不能肅降則大陽不宣此由上竅阻而下竅滯也一由暑積在胃秋涼外束肺氣內行為胃肅除積垢積不下則氣不宣此由積阻而致大陽滯也干金外覆離傷術暑自肺而傳於大腸者則為後重痢白營暑自心而傳於小腸者則為腹痛痢赤大小腸俱受暑滯則赤白相混矣光自病腑後則病臟先自暑積內阻後則正虛下陷由此以發前腎之議治法可推矣若但言積滯何痢必發於秋乎若因感冒外束暑積下攻者先用人參敗毒散從足經逆挽之論溫瘧冬傷於寒復感春風光熱後寒夏傷於暑復感秋風光寒後熱溫瘧出於秋症名原未確監因秋溫不離瘧象瘧疾又帶秋溫如溫如瘧故俗名之如風露新涼秋蟲疊出其名雖異其稟同也其感則一其源有二均因自夏徂秋汗出腠疏外風襲衛伏暑傷營營液已耗不能傳送暑熱衛陽受束不能豉舞涼風以致伏暑侵衛涼風逼營風暑相搏營衛分爭寒輕熱重緩退復萌營衛相近即近瘧也其起甚微人每不謹嗜饌貪涼邪積蘊結阻住陽明熱勢忽劇此先似瘧而後似溫也一以秋時入少陽先見憎寒發熱熱不退或但熱不寒日晡所有寒熱此先似溫而後似瘧也治法近瘧固搜營衛光解涼風以宣伏暑次清暑熱以保營津即秋時初起未行汗解亦宜先開手經令毛竅先松足經邪達再審足經邪蘊方透足經若早用足經升散溫藥恐致煩躁陽升昏譫厥逆如寇入前營光招後寨前路未開後軍簇擁元帥驚慌守營無主畫出真陽一越救逆莫及矣一為風暑爭營衛一是秋邪入少陽自惜青年夫造極並非靈素有涵藏論瘧溫瘧秋溫症異源同陽虛則病冬易傷寒陰虛則病夏易傷暑寒入足經下受先宜溫散取汗暑入手經上受先由清心利小便冬寒至春自少陽而達者為春溫夏暑至秋自肺而達者為秋病鬱蒸即是暑新涼便是秋可知夏亦有涼風秋亦沾暑熱涼多暑少則邪入足經為正瘧暑多涼少則邪留手經為暑瘧涼風生寒伏暑發熱風輕涼輕暑重熱重風解寒解暑解熱解暑風佇定氣血界限分清者應為正瘧暑風混雜氣血界限模糊者則為溫瘧先寒後熱寒輕熱重或熱退不清或退後復作或朝清暮劇或日重日輕血中伏暑留戀最為淹滯非比傷寒一日二三度發為欲愈也此言濕瘧與內經不同經義以冬傷於寒復感春風先熱後寒為溫瘧出自聖名今但以寒熱饃糊熱退不清秋溫間瘧為溫瘧出於俗號涼風易解伏暑難清延至營虛暑熱溜入陽明但熱不寒熱蒸不退俗名秋溫矣故瘧症有轉溫瘧溫瘧復化秋溫為病進秋溫能入溫瘧溫瘧更成正瘧為病衰故曰三症症異源同也春溫以令名秋溫以伏暑化溫究屬牽強即秋燥秋濕亦不著貼發千古未闡之奧辟世俗混指之原洵是長沙功臣潤論秋時嘉言以不頭疼而口渴為辨春溫第一義秋濕亦然頭疼者新感也口渴者伏氣也秋令時邪與春溫相似而相異者春溫乃伏寒化溫自少陽而達發於收藏之後津液全易汗易達秋溫乃伏暑為邪自營分而傳發於開泄之後津液耗易痢易陷春溫自足經達而播及手經秋溫自手經受而傳於足經其秋涼新感亦有全在足經竟無伏暑者又有伏暑由感冒觸發者只要分明伏暑新感但以症候顯見何經即在何經參治之亦不據定何經應感刻定何經額傳也瘧與秋時相類而相異者瘧邪循脊或隱陽原或伏陰膜渾如傳舍空隙無處交鋒至營衛氣血行遇方爭爭則陰陽勝復邪正皆混退則各分界限氣血皆清秋時則因夏月畫受炎蒸晚乘風露毛竅開時潛滋滲入暑熱露涼舍於肌肉積日成月層層蘊結秋涼風起汗孔一收從降今而逼入陽明則病作矣先見惡寒未罷而寒勢方張乃衛與太陽之涼風一辶𠀁營與陽明之伏暑蒸騰輕於辰已之交重於午未之後退則隱於陽明之半進則蔓延各經口渴小便澀其常也或有汗無汗或才出復熱大便或閉或溏甚者神昏譫語舌黑唇焦夜以繼日水不絕口邪從陽化為狂為癍或入少陽血分日晡寒熱口苦咽乾耳聾目定煩悶神迷渴不欲飲津為熱耗血受邪凝渴而能飲者可從氣分發泄渴不欲飲者宜從血分搜求甚至邪血膠結有非攻不解者蓋傷寒重六經伏氣究三焦傷寒論陰陽伏暑分氣血今之論陰陽則詳分氣血則略況伏暑至血分症淹殢志饃糊脈耎數最為傳陰之象須從血分提邪若邪從陰陷原有陽邪入陰治例若真陽已衰邪乘虛陷無陽不化原可從於溫托殢音替極困也隱於陽明之半涼膈散加豆豉六一散無汗加香茹邪不蟠踞胃腑去硝黃邪入少陽血分柴胡升麻主川芎主當歸黃芩山梔主紅花主片姜或加蒼芥陰虛合四物湯用血結加桃仁鱉甲邪血膠結合三甲飲胃實熱血結者量加酒製大黃甚有邪火熾極過於血分者發為郁癍郁癍者紅如馬腦質圓厚色光潤照至肌肉偶見一點周身不過數點或數十點與痘瘡閉症發癍一般古人惟以青紫黑癍為險而鬱癍更足可虛前法攻血透邪中或加茅根浮萍香盡等透汗或合犀角地黃湯清熱細細參治又有鬱症發於秋者木邪郁久遇克而升亦發時瘧又有陰虛之人逢亢熱炎蒸之後陰液大傷陽太發泄屆秋肺不收降以供生水之源設有伏暑涼風祗宜輕揚手經令營衛稍宣上焦得通津液得下伏邪有透路則肺氣有權開而能降若下虛上窒升而不降肺氣無權強用足經升藥則陽自邪升下不攝而上不降喘逆至矣及左尺虛數不耐者柴胡慎之繆仲醇屬筆記亦言之伏暑舍營秋邪本在血分者多即大瘧屬陰即血也而小瘧下午發者已關血分而況夜瘧乎瘧不頭疼者均宜血分搜求但不令動血耳若吐血晡熱雖為虛症亦宜參水清湯不沸意經曰冬傷於寒春必病溫症自外受為實症冬不藏精春必病溫症自內起為虛症夏傷於暑秋為疲瘧症自外受為實症逆之則傷心秋為痎瘧症自內起郁虛症夏令心志不舒則離陽受亢秋令龍雷下動發為厥瘧厥瘧者冷氣起於少腹沖逆至胃則振寒或厥痛至上陽一勝則發熱厥平或汗解痎亥為陰乃厥陰藏血之地矣此症與金匱牝瘧同意故用蜀漆靈母龍骨為方余以當歸桂枝湯加泄肝驗秋月蚤寒從足經症治者總不出仲聖範圍故略採其綱以敘之然傷寒自表傳裡故起自太陽如伏氣自里達表故先敘厥陰足厥陰肝經起於足大指大敦穴循中內廉絡陰器抵少腹從脅注肺中上喉循督脈至巔頂從目系下頰裡環唇內終於期門穴是經藏血屬木膽火寄於中主血主目主筋主呼主怒本病諸風眩暈僵仆強直驚癇兩脅腫痛胸肋滿痛嘔血小腹疝痛痃瘕女人經病標病寒熱瘧頭痛吐涎目赤面青多怒耳閉頰腫筋攣卵縮丈夫㿗疝女人少腹腫痛陰病有餘瀉之瀉子甘草行氣香附川芎瞿麥青皮牽牛行血紅花鱉甲山甲桃仁大黃虻蟲水蛭三稜莪朮丹皮蘇木鎮驚雄黃金箔銀箔鉛丹鐵粉胡粉頳石石決明珍珠夜明砂龍骨搜風羌活獨活防風荊芥薄荷槐子皂夾蔓荊烏頭姜蠶白附子蟬退白花蛇不足補之補母枸杞社仲狗脊熟地苦參萆薢兔絲阿膠補血當歸川芎白芍牛膝川斷乳香沒藥血竭補氣天麻柏子仁白朮菊花細辛蒙花決明生薑谷稍草本熱寒之瀉木芍藥烏梅澤瀉攻裡大黃瀉火黃連龍膽黃芩苦茶豬膽標熱發之和解柴胡半豆解肌桂枝麻黃本經報使菁皮柴胡吳萸川芎傷寒六日厥陰受之其症煩滿囊縮乾嘔吐沫亦頭痛身涼手足冷脈沉遲宜附子四逆加吳茱萸湯主之足少陰腎經起於湧泉循足內後廉絡膀胱貫腎夾背內脊絡肺循咽舌本終於前府穴是經藏志屬水為天一之源也主聽主骨主二陰本病諸寒厥逆骨痿腰痛腰冷如冰足胻腫寒少腹滿急疝瘕大便閉泄吐利腥穢水液澄澈清冷不禁消渴引飲標病發熱不惡寒頭眩頭痛咽痛舌燥脊股內後廉痛水強瀉之瀉子大戟牽牛瀉腑澤瀉車前豬苓茯苓防已水弱補之補母人參山藥補氣知母元參苦參砂仁故紙補血黃柏山萸枸杞五味覆盆阿膠女貞熟地鎖陽蓯容本熱攻之下大黃芒硝枳實厚朴本塞溫之附子官桂白朮乾薑川椒溫里標熱涼之清熱元參連翹甘草豬膚標寒解之解表麻黃細辛獨活桂枝腎經報使桂枝獨活知母細辛足太陰脾經起於足大指隱白穴從內廉入腹布胃中上膈注心中至唇終於乳下大包穴是經血少氣旺主藏智屬土為萬物之母主營衛主味主肌肉主四肢本病諸濕腫脹痞滿噫氣大小便閉黃疸痰飲本經五飲一曰停飲水停心下也二曰癖飲水在兩脅下也三曰痰飲水在胃中也四日溢飲水在五藏間也五曰流飲水在胸間也俱以白朮為君桂心炮姜為佐標病吐瀉霍亂心腹痛飲食不化身體胕腫重困嗜臥四肢不舉舌本強痛九竅不通足大趾不用諸痙項強土實瀉之瀉子訶子防風桑皮葶藶吐豆豉梔子萊菔常山瓜蒂鬱金赤小豆藜蘆苦參韭汁鹽湯苦茶下大黃芒硝礞石大戟甘遂芫花千金子土虛補之補母桂心茯苓補氣人參黃耆升麻葛根甘草陳皮藿香玉竹砂仁木香扁豆白朮蒼朮補血蒼朮白朮白芍膠飴大棗乾薑木瓜烏梅蜂蜜本濕除之燥中蒼朮白朮吳萸南星半夏橘皮草蔻芥子潔淨府本通豬苓茯苓藿香標熱滲之開鬼門葛根蒼朮麻黃獨活本經報使升麻葛根蒼朮白巧傷寒四日太陰受之其症腹滿嗌乾腹痛便溏自利不渴厥冷拘急結胸吐蛔其脈沉而無力理中湯主之或附子理中湯足少陽膽經起於瞳子窌循頭側絡耳走肩背循脅下環挑走足外中廉至足小指竅陰穴是經多氣少血屬木為少陽相火發生萬物為決斷之官十一肘之主本病口苦嘔苦汁善太息澹澹如人將捕狀目昏不眠標病寒熱往來痁瘧胸脅痛頭額痛耳痛鳴聾瘰癧結核馬刀足小指次指不用實火瀉之瀉膽龍膽草黃連苦茯豬膽生棗仁牛膝生蕤仁虛火補之溫膽人參細辛半夏當歸地黃炒棗仁炒蕤仁本熱平之降火黃芩黃連芍藥甘草連翹黑鉛鎮驚標熱和之和解柴胡黃芩半夏白芍甘草本經報使柴胡青皮傷寒三日少陽受之其症脅痛耳襲口苦不欲食心煩喜嘔或渴或利寒熱其脈弦數頭痛發熱者小柴胡湯主之少陽以胸脅之間為半表半裡寒多者表冬小柴胡湯里名者熱盛黃芩湯足陽明胃經絡目循額從顴挾鼻絡口環唇下人迎斜缺盆循胸腹走腿正面至次足指厲兌穴自經多氣多血屬土主容受為水穀之海余同脾本病嗌膈反胃中滿腫脹治中滿人參七分制茅朮八分黃耆木香橘紅各五分升麻柴胡各三分姜兩片棗兩枚有痰加半夏腹痛加砂仁吳萸小水不利加牛膝腫加苡仁腹痛甚加和中散此即調胃益氣加減中滿莫過此方嘔吐瀉痢霍亂腹痛消中善飢不消食傷飲食支兩脅胸胃脘當心痛標病發熱蒸蒸身前熱身前寒發狂譫語咽痹上齒痛口眼喎斜鼻痛鼽衄赤皶胃熱瀉之濕熱大黃芒硝飲食神麯山查鬱金三稜阿魏巴豆滷砂輕粉胃虛補之濕熱蒼朮白朮半夏茯苓陳皮生薑寒濕乾薑附子草果官桂丁香肉果人參黃耆本熱寒之降火地黃石膏犀角川連標熱解之解肌升麻葛根豆豉本經報使升麻葛根白芷石膏傷寒二日陽明受之其症身熱鼻乾目腫不得臥自汗譫語鄭聲胃實不大便三焦大熱其脈沉實承氣湯主之此治腑陽明熱在肌肉目痛鼻乾不眠在經為表葛根湯解肌渴口渴背寒熱漸入里白虎加人參湯至自汗譫狂則熱入胃腑為全入里調胃承氣湯足太陽膀胱經起於目內眥睛明穴上交巔入絡腦下項循肩挾脊抵腰中貫臀走外後廉至足小指至陰穴自經多血少氣下連血海主津液氣分為脆之府氣化乃能出號州都之官諸病皆干之本病小便淋瀝或短數或黃赤或白或遺失或氣膀胱為本熱入膀胱其人必渴小便不利是太陽里故水逆用五苓散標病發熱惡寒頭痛腰脊強鼻塞足小指不用太陽為慄寒傷營風傷衛必發熱惡寒頭痛鼻塞無汗麻黃湯有汗桂枝湯實熱瀉之泄火滑石豬苓茯苓澤瀉下虛補之熱黃柏知母寒桔梗升麻益智烏藥山萸本熱利之降火地黃茵陳梔子黃柏丹皮地骨皮標寒發之發表麻黃桂枝羌活蒼朮防己黃耆木賊草本經報使羌活傷寒一日太陽受之其症脈浮頭項強痛汗出惡風脈緩者中風桂枝湯無汗惡霧脈陰陽俱緊者傷寒麻黃湯均有發熱熱渴而煩水入即吐者名曰水逆五苓散瀉腑柴葛解肌治太陽陽明合病柴葛芷羌芍甘苓桔薑棗陽明已具七八猶有太陽一二者仍從太陽用藥柴胡升麻湯治少陽陽明合病柴麻葛芥芍桑前豉苓姜膏陽明已具七八才見少陽一二者即治少陽升麻葛根湯治陽明症升葛芍甘姜九味羌活湯治太陽無汗羌防蒼細芎芷芩地甘薑蔥傷寒一日太陽受之太陽經脈循腰脊上頭項故頭項痛腰脊強二日陽明受之陽明主肉其脈挾鼻絡目故身熱目痛鼻乾不眠三日少陽受之少陽主膽其脈循脅絡耳故胸脅痛耳聾四日太陰受之太陰脈布胃絡嗌故腹痛嗌乾五日少陰受之少陰脈貫腎絡肺系舌本故口燥舌乾而渴六日厥陰受之厥陰脈循陰器而絡肝故煩滿囊縮若兩感者難治表急先救羨裡急先救里表裡俱急者大羌活湯陽症體重不下利為表急先以麻黃葛根解表後以調胃承氣攻裡陰疲身痛下利不止為裡急先用逆四逆湯救里後以桂枝救表陰陽未分者陶氏和中湯探之古法治兩感一日太陽少陰五苓散主之頭痛加先防口渴加知柏二日陽明太陰大柴胡湯主之三日少陽厥陰危甚大承氣湯加芎柴救之劉宗厚曰傷有兼風兼濕不同表裡俱實俱虛之異大抵俱虛為多脈從陽可治從陰者難治陽脈浮數動滑大陰脈沉澀弱弦微結濡遲芤散結代愚按兩感屬虛寒者亦宜在溫托搜求荊芥敗毒散治時行感冒二活二胡芷桔芎甘荊防茯道光壬午首夏後學鄒澍校讀一過並加圈跋數處傷寒熱病澍每患節菴中行擇焉不精嘉言語焉不詳及讀此編乃知此中有如許境界他日更加用力上紹長沙下開來學於有益民生豈淺鮮哉頃檢得素問熱論注一篇附呈雅正不腆敝帚祗合自享然得鴻裁印可焉知非一登龍門而其值十倍乎幸有以教之翼日復讀一過又跋傷寒傷暑症為對峙西北多風寒故傷寒重於傷暑江南多濕熱故傷暑倍於傷寒不過因長沙先生奢傷寒甚精後賢依傍而解者不止百家是以詳於傷寒而略於傷暑耳傷寒有化熱坎中陽滿也傷暑有化寒離中陽虛也青崖述內經以冬傷於寒至春而發者為溫病後人填以黃芩湯至夏而發者為熱病填以白虎湯是症從內經而方宗仲景此其同也又閱傷寒伏氣均有三也陽合病一從白虎一從黃芩此其異也北方寒民體實故伏氣多從寒化即冬傷於寒復感春風而發者先熱後寒為溫瘧則夏傷於暑復感秋風而發者先寒後熱為秋瘧亦為對峙矣南方多熱民體虛故伏氣有從暑化者即內經夏傷於暑秋為痎瘧之謂也溫字從陰出陽痎字從陽入陰二症天淵故伏暑雖有內經明訓而無仲聖之方可宗各家紛論不一宜乎治春病易而秋病難也
